<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <title>clippy — clips</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      border-bottom: 1px solid #141414;
      background: #0d0d0d;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 24px; }
    .logo { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
    .topbar nav a {
      font-size: 12px; color: #444; text-decoration: none; margin-left: 16px;
      padding: 4px 0; border-bottom: 2px solid transparent;
    }
    .topbar nav a:hover { color: #999; }
    .topbar nav a.active { color: #e0e0e0; border-bottom-color: #9146ff; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-right .user-name { font-size: 12px; color: #666; }
    .topbar-right .avatar { width: 24px; height: 24px; border-radius: 50%; }
    .logout-btn {
      background: none; border: 1px solid #222; color: #555; font-family: inherit;
      font-size: 11px; padding: 4px 12px; border-radius: 4px; cursor: pointer;
    }
    .logout-btn:hover { border-color: #444; color: #999; }

    /* Container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 32px;
      margin-bottom: 32px;
      padding: 20px 0;
      border-bottom: 1px solid #111;
    }
    .stat-item .val { font-size: 28px; font-weight: 700; color: #fff; }
    .stat-item .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: #444; margin-top: 2px; }

    /* Top channels */
    .top-channels {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .top-ch {
      font-size: 11px;
      padding: 6px 14px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 20px;
      color: #888;
      cursor: pointer;
    }
    .top-ch:hover { border-color: #333; color: #fff; }
    .top-ch .count { color: #444; margin-left: 4px; }
    .top-ch.active { border-color: #9146ff; color: #9146ff; }

    .section-title {
      font-size: 10px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 2px; color: #444; margin-bottom: 16px;
    }

    /* Clips grid */
    .clips-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .clip-card {
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .clip-card:hover { border-color: #333; }
    .clip-embed {
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0a0a;
    }
    .clip-embed iframe { width: 100%; height: 100%; border: none; }
    .clip-info { padding: 14px 16px; }
    .clip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .clip-channel { font-size: 13px; font-weight: 600; color: #fff; }
    .clip-jump { font-size: 12px; font-weight: 700; }
    .clip-jump.high { color: #22c55e; }
    .clip-jump.mega { color: #f59e0b; }
    .clip-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .vibe-tag {
      font-size: 10px; padding: 3px 8px; border-radius: 4px;
      font-weight: 500;
    }
    .vibe-tag.funny { background: #1a1a0a; color: #fbbf24; }
    .vibe-tag.hype { background: #0a1a0a; color: #22c55e; }
    .vibe-tag.awkward { background: #1a0a1a; color: #c084fc; }
    .vibe-tag.win { background: #0a1a1a; color: #38bdf8; }
    .vibe-tag.loss { background: #1a0a0a; color: #f87171; }
    .vibe-tag.rage { background: #1a0a0a; color: #ef4444; }
    .vibe-tag.shock { background: #1a1a0a; color: #fb923c; }
    .vibe-tag.clutch { background: #0a1a0a; color: #34d399; }
    .vibe-tag.wholesome { background: #0a1a1a; color: #67e8f9; }
    .vibe-tag.drama { background: #1a0a1a; color: #e879f9; }
    .vibe-tag.sad { background: #1a0a0a; color: #f87171; }
    .vibe-tag.neutral { background: #1a1a1a; color: #555; }
    .clip-time { font-size: 10px; color: #333; }
    .clip-desc { font-size: 12px; color: #666; line-height: 1.5; }
    .clip-actions { display: flex; gap: 8px; margin-top: 10px; }
    .clip-actions a {
      font-size: 10px; padding: 4px 10px; background: #1a1a1a; color: #666;
      border: 1px solid #222; border-radius: 4px; text-decoration: none; font-family: inherit;
    }
    .clip-actions a:hover { background: #222; color: #999; }
    .clip-actions a.primary { color: #22c55e; border-color: #22c55e44; }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; align-items: center;
      gap: 4px; padding: 24px 0;
    }
    .page-btn {
      background: #1a1a1a; color: #666; border: 1px solid #222;
      border-radius: 4px; padding: 6px 12px; font-family: inherit;
      font-size: 11px; cursor: pointer; min-width: 32px; text-align: center;
    }
    .page-btn:hover { background: #222; color: #999; }
    .page-btn.active { border-color: #9146ff; color: #9146ff; background: #1a0a2a; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 11px; color: #333; padding: 0 8px; }

    .empty { color: #222; font-size: 12px; text-align: center; padding: 48px 0; }

    /* Toggle switch */
    .toggle-switch {
      width: 36px; height: 20px; background: #222; border-radius: 10px;
      position: relative; transition: background 0.2s; flex-shrink: 0;
    }
    .toggle-switch.on { background: #9146ff; }
    .toggle-knob {
      width: 16px; height: 16px; background: #555; border-radius: 50%;
      position: absolute; top: 2px; left: 2px; transition: all 0.2s;
    }
    .toggle-switch.on .toggle-knob { left: 18px; background: #fff; }

    @media (max-width: 768px) {
      .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
      .topbar-left { gap: 12px; }
      .topbar nav a { font-size: 11px; margin-left: 10px; }
      .topbar-right { gap: 8px; }
      .container { padding: 20px 16px; }
      .clips-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 16px; flex-wrap: wrap; }
      .page-btn { padding: 5px 8px; font-size: 10px; min-width: 28px; }
      .stat-item .val { font-size: 22px; }
    }
    @media (max-width: 480px) {
      .topbar { padding: 10px 12px; }
      .topbar-left { gap: 8px; flex-wrap: wrap; }
      .topbar nav a { font-size: 10px; margin-left: 8px; }
      .logo { font-size: 13px; }
      .container { padding: 16px 12px; }
      .page-btn { padding: 4px 6px; font-size: 10px; min-width: 24px; }
      .clip-info { padding: 10px 12px; }
      .stat-item .val { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo"><img src="/logoclip.png" alt="" style="width:30px;height:30px;vertical-align:middle;margin-right:6px">clippy</div>
      <nav id="navLinks">
        <a href="/">home</a>
        <a href="/dashboard.html">dashboard</a>
        <a href="/clips.html" class="active">clips</a>
      </nav>
    </div>
    <div class="topbar-right">
      <a href="https://discord.gg/SGRBWsBXQ7" target="_blank" style="font-size:11px;color:#5865F2;text-decoration:none;padding:4px 10px;border:1px solid #5865F233;border-radius:4px;display:flex;align-items:center;gap:5px" onmouseover="this.style.borderColor='#5865F2';this.style.background='#5865F211'" onmouseout="this.style.borderColor='#5865F233';this.style.background='none'"><svg width="14" height="14" viewBox="0 0 71 55" fill="#5865F2"><path d="M60.1 4.9A58.5 58.5 0 0045.4.2a.2.2 0 00-.2.1 40.8 40.8 0 00-1.8 3.7 54 54 0 00-16.2 0A37.3 37.3 0 0025.4.3a.2.2 0 00-.2-.1A58.4 58.4 0 0010.5 4.9a.2.2 0 00-.1.1C1.5 18.7-.9 32.2.3 45.5v.2a58.9 58.9 0 0017.7 9 .2.2 0 00.3-.1 42 42 0 003.6-5.9.2.2 0 00-.1-.3 38.8 38.8 0 01-5.5-2.6.2.2 0 01 0-.4c.4-.3.7-.6 1.1-.8a.2.2 0 01.2 0 42 42 0 0035.6 0 .2.2 0 01.2 0l1.1.9a.2.2 0 010 .3 36.4 36.4 0 01-5.5 2.6.2.2 0 00-.1.4 47.2 47.2 0 003.6 5.8.2.2 0 00.3.1A58.7 58.7 0 0070.4 45.7v-.2c1.4-15-2.3-28.1-9.8-39.7a.2.2 0 00-.1 0zM23.7 37.3c-3.4 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.1 6.3 7-2.8 7-6.3 7zm23.2 0c-3.4 0-6.3-3.2-6.3-7s2.8-7 6.3-7 6.4 3.1 6.3 7-2.8 7-6.3 7z"/></svg>discord</a>
      <img class="avatar" id="userAvatar" src="" alt="" style="display:none">
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" onclick="logout()">logout</button>
    </div>
  </div>

  <div class="container">
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><div class="val" id="statTotal">-</div><div class="lbl">total moments</div></div>
      <div class="stat-item"><div class="val" id="statClipped">-</div><div class="lbl">clips created</div></div>
      <div class="stat-item"><div class="val" id="statRate">-</div><div class="lbl">clip rate</div></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="section-title" style="margin-bottom:0">top channels</div>
      <div style="position:relative">
        <input type="text" id="channelSearch" placeholder="search channel..." oninput="handleChannelSearch()" onkeydown="if(event.key==='Enter'){applySearch()}" style="background:#111;border:1px solid #1a1a1a;border-radius:6px;padding:8px 14px 8px 30px;color:#fff;font-family:inherit;font-size:12px;outline:none;width:220px">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.3" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <div id="searchResults" style="display:none;position:absolute;top:100%;left:0;right:0;background:#111;border:1px solid #222;border-radius:6px;margin-top:4px;max-height:200px;overflow-y:auto;z-index:50"></div>
      </div>
    </div>
    <div class="top-channels" id="topChannels"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title" style="margin-bottom:0">recent clips</div>
      <div id="myClipsToggle" style="display:none;align-items:center;gap:10px;font-size:12px;color:#666;cursor:pointer;user-select:none" onclick="toggleMyClips()">
        <span>my channels only</span>
        <div class="toggle-switch" id="myClipsSwitch">
          <div class="toggle-knob"></div>
        </div>
      </div>
    </div>
    <div class="clips-grid" id="clipsGrid">
      <div class="empty">loading...</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script>
    let currentUser = null
    let allClips = []
    let myChannels = []
    let currentPage = 1
    let totalClips = 0
    let filterChannel = null
    let myClipsOnly = false
    const PER_PAGE = 12

    // Lazy load observer — only loads iframes when they scroll into view
    const lazyObserver = new IntersectionObserver((entries) => {
      for (const entry of entries) {
        if (entry.isIntersecting) {
          const el = entry.target
          const src = el.getAttribute('data-src')
          if (src) {
            el.innerHTML = `<iframe src="${src}" allowfullscreen></iframe>`
            el.removeAttribute('data-src')
          }
          lazyObserver.unobserve(el)
        }
      }
    }, { rootMargin: '200px' })

    // Auth check
    fetch('/auth/me').then(r => r.json()).then(d => {
      if (!d.authenticated) return window.location.href = '/login.html'
      currentUser = d.user
      document.getElementById('userName').textContent = d.user.username
      if (d.user.profileImage) {
        const av = document.getElementById('userAvatar')
        av.src = d.user.profileImage
        av.style.display = 'block'
      }
      if (d.user.role === 'admin') {
        const nav = document.getElementById('navLinks')
        const a = document.createElement('a')
        a.href = '/admin.html'
        a.textContent = 'admin'
        nav.appendChild(a)
      }
      fetch('/my/channels').then(r => r.json()).then(data => {
        myChannels = (data.channels || []).map(c => c.channel)
        if (myChannels.length > 0) {
          document.getElementById('myClipsToggle').style.display = 'flex'
        }
      }).catch(() => {})
      loadPage(1)
    }).catch(() => window.location.href = '/login.html')

    async function loadPage(page) {
      currentPage = page
      const offset = (page - 1) * PER_PAGE
      try {
        let url = `/api/clips?limit=${PER_PAGE}&offset=${offset}`
        if (filterChannel) url += `&channel=${encodeURIComponent(filterChannel)}`
        const res = await fetch(url)
        const data = await res.json()

        document.getElementById('statTotal').textContent = data.stats.total.toLocaleString()
        document.getElementById('statClipped').textContent = data.stats.clipped.toLocaleString()
        const rate = data.stats.total > 0 ? Math.round((data.stats.clipped / data.stats.total) * 100) : 0
        document.getElementById('statRate').textContent = rate + '%'
        totalClips = data.filteredTotal

        allTopChannels = data.stats.topChannels
        const topEl = document.getElementById('topChannels')
        topEl.innerHTML = data.stats.topChannels.map(ch =>
          `<div class="top-ch ${filterChannel === ch.channel ? 'active' : ''}" onclick="toggleFilter('${ch.channel}')">
            ${esc(ch.channel)}<span class="count">${ch.count}</span>
          </div>`
        ).join('')

        allClips = data.clips
        renderClips()
        renderPagination()
        window.scrollTo({ top: 0, behavior: 'smooth' })
      } catch {}
    }

    function toggleMyClips() {
      myClipsOnly = !myClipsOnly
      const sw = document.getElementById('myClipsSwitch')
      sw.className = myClipsOnly ? 'toggle-switch on' : 'toggle-switch'
      renderClips()
      renderPagination()
    }

    function renderClips() {
      const grid = document.getElementById('clipsGrid')
      let filtered = allClips
      if (myClipsOnly && myChannels.length > 0) filtered = filtered.filter(c => myChannels.includes(c.channel.toLowerCase()))

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty">no clips yet</div>'
        return
      }

      grid.innerHTML = filtered.map(c => {
        const jumpClass = c.jumpPercent > 150 ? 'mega' : c.jumpPercent > 50 ? 'high' : ''
        const moodTag = c.mood || c.vibe
        const clipSlug = c.clipUrl ? c.clipUrl.split('/').pop() : null
        const time = new Date(c.timestamp).toLocaleString()
        const embedSrc = clipSlug ? `https://clips.twitch.tv/embed?clip=${clipSlug}&parent=${location.hostname}&autoplay=false&muted=true` : null

        return `
          <div class="clip-card">
            ${embedSrc ? `<div class="clip-embed" data-src="${embedSrc}"></div>` : ''}
            <div class="clip-info">
              <div class="clip-header">
                <span class="clip-channel">${esc(c.channel)}</span>
                <span class="clip-jump ${jumpClass}">+${c.jumpPercent}%</span>
              </div>
              <div class="clip-meta">
                <span class="vibe-tag ${moodTag}">${moodTag}</span>
                <span class="clip-time">${time}</span>
              </div>
              ${c.description ? `<div class="clip-desc">${esc(c.description)}</div>` : ''}
              <div class="clip-actions">
                ${c.clipUrl ? `<a class="primary" href="${c.clipUrl}" target="_blank">watch clip</a>` : ''}
                ${c.vodUrl ? `<a href="${c.vodUrl}" target="_blank">vod</a>` : ''}
                <a href="/clip/${c.id}">details</a>
              </div>
            </div>
          </div>
        `
      }).join('')

      // Observe all lazy embeds
      grid.querySelectorAll('.clip-embed[data-src]').forEach(el => lazyObserver.observe(el))
    }

    function renderPagination() {
      const el = document.getElementById('pagination')
      const totalPages = Math.max(1, Math.ceil(totalClips / PER_PAGE))
      if (totalPages <= 1) { el.innerHTML = ''; return }

      let html = `<button class="page-btn" onclick="loadPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>&laquo;</button>`

      // Show up to 7 page buttons with ellipsis
      const pages = []
      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i)
      } else {
        pages.push(1)
        if (currentPage > 3) pages.push('...')
        for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i)
        if (currentPage < totalPages - 2) pages.push('...')
        pages.push(totalPages)
      }

      for (const p of pages) {
        if (p === '...') {
          html += `<span class="page-info">...</span>`
        } else {
          html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="loadPage(${p})">${p}</button>`
        }
      }

      html += `<button class="page-btn" onclick="loadPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>&raquo;</button>`
      el.innerHTML = html
    }

    function toggleFilter(channel) {
      filterChannel = filterChannel === channel ? null : channel
      document.getElementById('channelSearch').value = filterChannel || ''
      loadPage(1)
    }

    // --- Channel search ---
    let allTopChannels = []

    function handleChannelSearch() {
      const q = document.getElementById('channelSearch').value.trim().toLowerCase()
      const dropdown = document.getElementById('searchResults')
      if (!q) { dropdown.style.display = 'none'; return }

      const matches = allTopChannels.filter(ch => ch.channel.toLowerCase().includes(q))
      if (matches.length === 0) {
        // Allow searching for any channel even if not in top list
        dropdown.innerHTML = `<div style="padding:8px 12px;font-size:11px;color:#666;cursor:pointer" onclick="searchChannel('${esc(q)}')">${esc(q)} <span style="color:#444">— search</span></div>`
      } else {
        dropdown.innerHTML = matches.slice(0, 10).map(ch =>
          `<div style="padding:8px 12px;font-size:11px;color:#ccc;cursor:pointer;display:flex;justify-content:space-between" onmouseover="this.style.background='#1a1a1a'" onmouseout="this.style.background='none'" onclick="searchChannel('${esc(ch.channel)}')">
            <span>${esc(ch.channel)}</span><span style="color:#444">${ch.count} clips</span>
          </div>`
        ).join('')
      }
      dropdown.style.display = 'block'
    }

    function searchChannel(channel) {
      document.getElementById('channelSearch').value = channel
      document.getElementById('searchResults').style.display = 'none'
      filterChannel = channel.toLowerCase()
      loadPage(1)
    }

    function applySearch() {
      const q = document.getElementById('channelSearch').value.trim()
      document.getElementById('searchResults').style.display = 'none'
      if (q) {
        filterChannel = q.toLowerCase()
      } else {
        filterChannel = null
      }
      loadPage(1)
    }

    // Close search dropdown on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#channelSearch') && !e.target.closest('#searchResults')) {
        document.getElementById('searchResults').style.display = 'none'
      }
    })

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

    async function logout() {
      await fetch('/auth/logout', { method: 'POST' })
      window.location.href = '/login.html'
    }
  </script>
</body>
</html>
