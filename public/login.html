<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clippy — login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    .logo {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 12px;
      color: #444;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .twitch-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      background: #9146ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
    }
    .twitch-btn:hover {
      background: #7c3aed;
    }
    .twitch-icon {
      width: 18px;
      height: 18px;
    }
    .error {
      background: #1a0a0a;
      border: 1px solid #331111;
      border-radius: 6px;
      padding: 12px 16px;
      font-size: 12px;
      color: #f87171;
      margin-bottom: 24px;
    }
    .hint {
      font-size: 11px;
      color: #333;
      margin-top: 24px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">clippy</div>
    <div class="subtitle">real-time twitch stream intelligence</div>

    <div id="errorBox" class="error" style="display:none"></div>

    <button class="twitch-btn" onclick="window.location.href='/auth/twitch'">
      <svg class="twitch-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
      login with twitch
    </button>

    <div class="hint">
      sign in with your twitch account to get started
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search)
    if (params.get('error')) {
      const msgs = {
        oauth_failed: 'Twitch OAuth failed. Try again.',
        user_fetch_failed: 'Could not fetch your Twitch profile.',
        server_error: 'Something went wrong. Try again.',
      }
      const errorBox = document.getElementById('errorBox')
      errorBox.textContent = msgs[params.get('error')] || 'Unknown error.'
      errorBox.style.display = 'block'
    }

    // If already logged in, redirect to dashboard
    fetch('/auth/me').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/'
    }).catch(() => {})
  </script>
</body>
</html>
