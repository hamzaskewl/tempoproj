<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clippy — live demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 16px;
    }
    h1 { font-size: 16px; font-weight: 500; }
    h1 a { color: #e0e0e0; text-decoration: none; }
    nav a { font-size: 12px; color: #555; text-decoration: none; margin-left: 12px; }
    nav a.active { color: #fff; }

    .input-row {
      display: flex; gap: 8px; margin-bottom: 32px;
    }
    .input-row input {
      flex: 1; background: #111; border: 1px solid #222; border-radius: 4px;
      padding: 10px 14px; color: #fff; font-family: inherit; font-size: 13px;
      outline: none;
    }
    .input-row input:focus { border-color: #444; }
    .input-row input::placeholder { color: #333; }
    .input-row button {
      background: #fff; color: #0a0a0a; border: none; border-radius: 4px;
      padding: 10px 20px; font-family: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
    }
    .input-row button:hover { background: #ddd; }
    .input-row button:disabled { background: #333; color: #666; cursor: default; }

    .pipeline { display: flex; flex-direction: column; gap: 0; }
    .step {
      padding: 16px;
      border-left: 2px solid #1a1a1a;
      margin-left: 10px;
      position: relative;
      min-height: 48px;
    }
    .step::before {
      content: '';
      position: absolute;
      left: -7px; top: 18px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 2px solid #0a0a0a;
    }
    .step.active { border-left-color: #333; }
    .step.active::before { background: #f59e0b; }
    .step.done { border-left-color: #22c55e44; }
    .step.done::before { background: #22c55e; }
    .step.failed::before { background: #ef4444; }
    .step-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: #444; margin-bottom: 6px;
    }
    .step.active .step-title { color: #f59e0b; }
    .step.done .step-title { color: #22c55e; }
    .step-content { font-size: 13px; color: #888; }
    .step-content b { color: #fff; font-weight: 500; }
    .step-content .sub { font-size: 11px; color: #555; margin-top: 4px; }

    .chat-live {
      font-size: 11px; color: #444; line-height: 1.6;
      padding: 10px; background: #0a0a0a; border-radius: 3px;
      max-height: 150px; overflow-y: auto; margin-top: 8px;
    }
    .chat-live .u { color: #666; }

    .mood-tag {
      display: inline-block; font-size: 11px; padding: 2px 8px;
      border-radius: 3px; margin-right: 4px;
    }
    .mood-tag.funny { background: #1a1a0a; color: #fbbf24; }
    .mood-tag.hype { background: #0a1a0a; color: #22c55e; }
    .mood-tag.awkward { background: #1a0a1a; color: #c084fc; }
    .mood-tag.rage { background: #1a0a0a; color: #ef4444; }
    .mood-tag.shock { background: #1a1a0a; color: #fb923c; }
    .mood-tag.clutch { background: #0a1a0a; color: #34d399; }
    .mood-tag.wholesome { background: #0a1a1a; color: #67e8f9; }
    .mood-tag.drama { background: #1a0a1a; color: #e879f9; }
    .mood-tag.sad { background: #1a0a0a; color: #f87171; }
    .mood-tag.neutral { background: #1a1a1a; color: #666; }

    .clip-embed {
      margin-top: 12px; border-radius: 6px; overflow: hidden;
      background: #111; aspect-ratio: 16/9;
    }
    .clip-embed iframe { width: 100%; height: 100%; border: none; }

    .clip-link {
      display: inline-block; margin-top: 8px; font-size: 12px;
      color: #22c55e; text-decoration: none;
    }
    .clip-link:hover { color: #4ade80; }

    .waiting-pulse {
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .history { margin-top: 32px; }
    .history-item {
      padding: 10px 12px; background: #111; border: 1px solid #161616;
      border-radius: 4px; margin-bottom: 4px; font-size: 12px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .history-item a { color: #22c55e; text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">clippy</a></h1>
    <nav>
      <a href="/">dashboard</a>
      <a href="/docs.html">docs</a>
      <a href="/demo.html" class="active">demo</a>
    </nav>
  </header>

  <div class="input-row">
    <input type="text" id="channelInput" placeholder="enter channel name (e.g. jynxzi)" onkeydown="if(event.key==='Enter')startWatch()">
    <button id="watchBtn" onclick="startWatch()">watch</button>
  </div>

  <div class="pipeline" id="pipeline" style="display:none">
    <div class="step" id="step-connect">
      <div class="step-title">connecting</div>
      <div class="step-content" id="step-connect-content">connecting to firehose...</div>
    </div>
    <div class="step" id="step-baseline">
      <div class="step-title">reading chat</div>
      <div class="step-content" id="step-baseline-content">building baseline...</div>
    </div>
    <div class="step" id="step-watching">
      <div class="step-title">watching for spikes</div>
      <div class="step-content" id="step-watching-content"><span class="waiting-pulse">monitoring chat velocity...</span></div>
    </div>
    <div class="step" id="step-spike">
      <div class="step-title">spike detected</div>
      <div class="step-content" id="step-spike-content">waiting...</div>
    </div>
    <div class="step" id="step-classify">
      <div class="step-title">ai classification</div>
      <div class="step-content" id="step-classify-content">waiting for spike...</div>
    </div>
    <div class="step" id="step-clip">
      <div class="step-title">clip</div>
      <div class="step-content" id="step-clip-content">waiting...</div>
    </div>
  </div>

  <div class="history" id="history" style="display:none">
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:8px">captured moments</div>
    <div id="historyList"></div>
  </div>

  <script>
    let watching = null
    let sse = null
    let pollInterval = null
    let moments = []

    function startWatch() {
      const channel = document.getElementById('channelInput').value.trim().toLowerCase()
      if (!channel) return
      if (watching) stopWatch()

      watching = channel
      document.getElementById('watchBtn').disabled = true
      document.getElementById('watchBtn').textContent = 'watching...'
      document.getElementById('pipeline').style.display = 'flex'
      document.getElementById('history').style.display = 'block'
      moments = []

      // Step 1: Connect
      setStep('connect', 'active', 'connecting to firehose...')

      // Add to watchlist for auto-clipping
      fetch(`/watch-clip/${channel}`, { method: 'POST' })

      // Connect SSE filtered to this channel
      sse = new EventSource(`/alerts?channel=${channel}`)
      sse.onmessage = (e) => {
        const data = JSON.parse(e.data)
        if (data.type === 'connected') {
          setStep('connect', 'done', `connected — tracking <b>${channel}</b>`)
          setStep('baseline', 'active', 'building baseline rate...')

          // Poll channel stats to show baseline building
          let polls = 0
          pollInterval = setInterval(async () => {
            try {
              const res = await fetch(`/moments/latest/${channel}`)
              // Just check health for baseline
            } catch {}

            polls++
            if (polls < 5) {
              setStep('baseline', 'active', `sampling chat rate... (${polls * 5}s)`)
            } else {
              setStep('baseline', 'done', 'baseline established')
              setStep('watching', 'active', `<span class="waiting-pulse">monitoring ${channel} for chat spikes...</span>`)
              clearInterval(pollInterval)
            }
          }, 5000)
        }

        if (data.type === 'spike') {
          handleSpike(data)
        }
      }
    }

    async function handleSpike(spike) {
      // Step: Spike detected
      setStep('watching', 'done', `spike detected at +${spike.jumpPercent}%`)
      setStep('spike', 'active', `
        <b>+${spike.jumpPercent}%</b> burst — chat velocity jumped
        <div class="sub">${spike.viewers ? (spike.viewers/1000).toFixed(1) + 'k viewers' : ''} &middot; ${new Date().toLocaleTimeString()}</div>
      `)

      // Try to get chat snapshot
      try {
        const res = await fetch(`/moments/latest/${spike.channel}`)
        if (res.ok) {
          const moment = await res.json()
          const chatHtml = moment.chatSnapshot?.slice(0, 12).map(m => {
            const idx = m.indexOf(': ')
            return idx > -1
              ? `<div><span class="u">${esc(m.slice(0,idx))}:</span> ${esc(m.slice(idx+2))}</div>`
              : `<div>${esc(m)}</div>`
          }).join('') || ''

          setStep('spike', 'done', `
            <b>+${spike.jumpPercent}%</b> burst
            <div class="sub">${spike.viewers ? (spike.viewers/1000).toFixed(1) + 'k viewers' : ''}</div>
            <div class="chat-live">${chatHtml}</div>
          `)

          // Step: AI Classification
          setStep('classify', 'active', 'sending chat to anthropic for classification...')

          // Try classify
          if (moment.mood) {
            showClassification(moment, spike)
          } else {
            const classRes = await fetch(`/moments/${moment.id}/classify`)
            if (classRes.ok) {
              const classified = await classRes.json()
              showClassification(classified, spike)
            } else {
              setStep('classify', 'done', `<span class="mood-tag ${spike.vibe}">${spike.vibe}</span> (regex fallback)`)
            }
          }

          // Check for clip at 4s, 10s, 18s — only add to history once
          let clipFound = false
          for (const delay of [4000, 10000, 18000]) {
            setTimeout(async () => {
              if (clipFound) return
              const freshRes = await fetch(`/moments/latest/${spike.channel}`)
              if (freshRes.ok) {
                const fresh = await freshRes.json()
                if (fresh.clipUrl) {
                  clipFound = true
                  setStep('clip', 'done', `
                    <a class="clip-link" href="${fresh.clipUrl}" target="_blank">${fresh.clipUrl}</a>
                  `)
                  addHistory(fresh)
                } else if (delay === 18000) {
                  setStep('clip', 'done', 'clip pending — check back shortly')
                }
              }
            }, delay)
          }
        }
      } catch {}

      // Loop back to watching after 10s
      setTimeout(() => {
        setStep('watching', 'active', `<span class="waiting-pulse">monitoring ${watching} for next spike...</span>`)
        setStep('spike', 'step', 'waiting...')
        setStep('classify', 'step', 'waiting for spike...')
        setStep('clip', 'step', 'waiting...')
      }, 10000)
    }

    function showClassification(data, spike) {
      const mood = data.mood || spike.vibe
      const desc = data.description || ''

      setStep('classify', 'done', `
        <span class="mood-tag ${mood}">${mood}</span>
        ${desc ? `<span style="color:#999">${desc}</span>` : ''}
      `)

      setStep('clip', 'active', 'creating twitch clip...')
    }

    let expandedHistory = null

    function addHistory(moment) {
      // Deduplicate by moment id
      if (moments.find(m => m.id === moment.id)) return
      moments.unshift(moment)
      renderHistory()
    }

    function toggleHistory(id) {
      expandedHistory = expandedHistory === id ? null : id
      renderHistory()
    }

    function renderHistory() {
      const el = document.getElementById('historyList')
      el.innerHTML = moments.map(m => {
        const isOpen = expandedHistory === m.id
        return `
          <div class="history-item" onclick="toggleHistory(${m.id})" style="cursor:pointer;flex-direction:column;align-items:stretch">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <span class="mood-tag ${m.mood || m.vibe}">${m.mood || m.vibe}</span>
                <b style="color:#fff">+${m.jumpPercent}%</b>
                ${m.description ? `<span style="color:#666;margin-left:8px">${m.description}</span>` : ''}
              </div>
              ${m.clipUrl ? `<a href="${m.clipUrl}" target="_blank" onclick="event.stopPropagation()" style="color:#22c55e;font-size:11px;text-decoration:none">clip</a>` : ''}
            </div>
            ${isOpen ? `
              <div style="margin-top:10px">
                ${m.clipUrl ? `<div class="clip-embed" style="margin-bottom:8px"><iframe src="${m.clipUrl.replace('clips.twitch.tv', 'clips.twitch.tv/embed')}?parent=${location.hostname}&autoplay=true&muted=false" allowfullscreen></iframe></div>` : ''}
                ${m.description ? `<div style="font-size:12px;color:#888;margin-bottom:8px"><b>${m.mood || m.vibe}</b> — ${m.description}</div>` : ''}
                ${m.chatSnapshot ? `<div style="font-size:11px;color:#444;line-height:1.6;padding:8px;background:#0a0a0a;border-radius:3px;max-height:120px;overflow-y:auto">${m.chatSnapshot.slice(0,12).map(msg => {
                  const idx = msg.indexOf(': ')
                  return idx > -1 ? '<div><span style="color:#555">' + esc(msg.slice(0,idx)) + ':</span> ' + esc(msg.slice(idx+2)) + '</div>' : '<div>' + esc(msg) + '</div>'
                }).join('')}</div>` : ''}
              </div>
            ` : ''}
          </div>
        `
      }).join('')
    }

    function setStep(name, state, html) {
      const el = document.getElementById(`step-${name}`)
      el.className = `step ${state}`
      document.getElementById(`step-${name}-content`).innerHTML = html
    }

    function stopWatch() {
      if (sse) { sse.close(); sse = null }
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null }
      if (watching) fetch(`/watch-clip/${watching}`, { method: 'DELETE' })
      watching = null
      document.getElementById('watchBtn').disabled = false
      document.getElementById('watchBtn').textContent = 'watch'
    }

    function esc(s) {
      const d = document.createElement('div')
      d.textContent = s
      return d.innerHTML
    }
  </script>
</body>
</html>
