<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clippy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
      border-bottom: 1px solid #222;
      padding-bottom: 16px;
    }
    h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.5px; }
    .status { font-size: 12px; color: #666; }
    .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; }
    .dot.live { background: #22c55e; }
    .dot.off { background: #ef4444; }
    .stats { display: flex; gap: 32px; margin-bottom: 32px; }
    .stat { }
    .stat-value { font-size: 24px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    section { margin-bottom: 40px; }
    h2 { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #666; margin-bottom: 16px; }
    .moments-list { display: flex; flex-direction: column; gap: 8px; }
    .moment {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      align-items: center;
      gap: 16px;
      padding: 12px 16px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      font-size: 13px;
      transition: border-color 0.15s;
    }
    .moment:hover { border-color: #333; }
    .moment.clip-worthy { border-left: 2px solid #f59e0b; }
    .channel-name { font-weight: 600; color: #fff; }
    .viewers { color: #666; font-size: 11px; }
    .jump { font-weight: 600; }
    .jump.high { color: #22c55e; }
    .jump.mega { color: #f59e0b; }
    .vibe-tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 3px;
      background: #1a1a1a;
      color: #999;
    }
    .vibe-tag.funny { background: #1a1a0a; color: #fbbf24; }
    .vibe-tag.hype { background: #0a1a0a; color: #22c55e; }
    .vibe-tag.awkward { background: #1a0a1a; color: #c084fc; }
    .vibe-tag.win { background: #0a1a1a; color: #38bdf8; }
    .vibe-tag.loss { background: #1a0a0a; color: #f87171; }
    .vod-link { color: #666; text-decoration: none; font-size: 12px; }
    .vod-link:hover { color: #fff; }
    .time-ago { color: #444; font-size: 11px; min-width: 50px; text-align: right; }
    .empty { color: #333; font-size: 13px; padding: 40px 0; text-align: center; }
    .trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
    .trending-card {
      padding: 12px;
      background: #111;
      border: 1px solid #1a1a1a;
      border-radius: 6px;
      font-size: 12px;
    }
    .trending-card .channel-name { font-size: 13px; margin-bottom: 4px; }
    .trending-card .rate { color: #666; }
    .trending-card .rate b { color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>clippy</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">connecting...</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="channelCount">-</div>
      <div class="stat-label">channels</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="msgRate">-</div>
      <div class="stat-label">msg/s</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="momentCount">-</div>
      <div class="stat-label">moments</div>
    </div>
  </div>

  <section>
    <h2>live spikes</h2>
    <div class="moments-list" id="spikesList">
      <div class="empty">waiting for spikes...</div>
    </div>
  </section>

  <section>
    <h2>trending</h2>
    <div class="trending-grid" id="trendingGrid">
      <div class="empty">loading...</div>
    </div>
  </section>

  <script>
    const spikes = []

    // SSE for live spike alerts
    const sse = new EventSource('/alerts')
    sse.onmessage = (e) => {
      const data = JSON.parse(e.data)
      if (data.type === 'connected') {
        document.getElementById('statusDot').className = 'dot live'
        document.getElementById('statusText').textContent = 'live'
      }
      if (data.type === 'spike') {
        spikes.unshift({ ...data, receivedAt: Date.now() })
        if (spikes.length > 50) spikes.pop()
        renderSpikes()
      }
    }
    sse.onerror = () => {
      document.getElementById('statusDot').className = 'dot off'
      document.getElementById('statusText').textContent = 'disconnected'
    }

    function renderSpikes() {
      const el = document.getElementById('spikesList')
      document.getElementById('momentCount').textContent = spikes.length
      if (spikes.length === 0) {
        el.innerHTML = '<div class="empty">waiting for spikes...</div>'
        return
      }
      el.innerHTML = spikes.map(s => {
        const jumpClass = s.jumpPercent > 150 ? 'mega' : s.jumpPercent > 50 ? 'high' : ''
        const ago = timeAgo(s.receivedAt)
        return `
          <div class="moment ${s.clipWorthy ? 'clip-worthy' : ''}">
            <div>
              <span class="channel-name">${s.channel}</span>
              ${s.viewers ? `<span class="viewers">${(s.viewers/1000).toFixed(1)}k viewers</span>` : ''}
            </div>
            <span class="jump ${jumpClass}">+${s.jumpPercent}%</span>
            <span class="vibe-tag ${s.vibe}">${s.vibe}</span>
            ${s.vodUrl ? `<a class="vod-link" href="${s.vodUrl}" target="_blank">${s.vodTimestamp}</a>` : '<span class="vod-link">-</span>'}
            <span class="time-ago">${ago}</span>
          </div>
        `
      }).join('')
    }

    function timeAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000)
      if (s < 60) return `${s}s`
      if (s < 3600) return `${Math.floor(s/60)}m`
      return `${Math.floor(s/3600)}h`
    }

    // Poll health + trending
    async function refresh() {
      try {
        const health = await fetch('/health').then(r => r.json())
        document.getElementById('channelCount').textContent = health.totalChannels.toLocaleString()
        document.getElementById('msgRate').textContent = health.totalMsgsPerSec.toFixed(0)
        document.getElementById('statusDot').className = 'dot ' + (health.connected ? 'live' : 'off')
        document.getElementById('statusText').textContent = health.connected ? 'live' : 'disconnected'
      } catch {}
    }

    // Update time-ago every 10s
    setInterval(() => renderSpikes(), 10000)
    setInterval(refresh, 5000)
    refresh()
  </script>
</body>
</html>
