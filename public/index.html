<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clippy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 24px;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 16px;
    }
    h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.5px; }
    nav a { font-size: 12px; color: #555; text-decoration: none; margin-left: 12px; }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; }
    .status { font-size: 12px; color: #555; }
    .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .dot.live { background: #22c55e; }
    .dot.off { background: #ef4444; }

    /* Watch input */
    .watch-bar {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .watch-bar input {
      flex: 1; background: #111; border: 1px solid #1a1a1a; border-radius: 4px;
      padding: 10px 14px; color: #fff; font-family: inherit; font-size: 13px; outline: none;
    }
    .watch-bar input:focus { border-color: #333; }
    .watch-bar input::placeholder { color: #2a2a2a; }
    .watch-bar button {
      background: #1a1a1a; color: #888; border: 1px solid #222; border-radius: 4px;
      padding: 10px 16px; font-family: inherit; font-size: 12px; cursor: pointer;
    }
    .watch-bar button:hover { background: #222; color: #fff; }

    /* Watching tags */
    .watching-tags { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .watch-tag {
      font-size: 11px; padding: 4px 10px; background: #111; border: 1px solid #1a1a1a;
      border-radius: 3px; color: #888; display: flex; align-items: center; gap: 6px;
    }
    .watch-tag .remove { color: #444; cursor: pointer; font-size: 13px; }
    .watch-tag .remove:hover { color: #ef4444; }

    /* Stats */
    .stats { display: flex; gap: 40px; margin-bottom: 24px; }
    .stat-value { font-size: 20px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }

    section { margin-bottom: 32px; }
    h2 { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: #444; margin-bottom: 10px; }

    /* Spike rows */
    .spikes-list { display: flex; flex-direction: column; gap: 3px; }
    .spike-row {
      display: grid;
      grid-template-columns: 140px 60px 55px 1fr 70px 40px;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #161616;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .spike-row:hover { background: #161616; }
    .spike-row.has-clip { border-left: 2px solid #22c55e; }
    .channel-col { display: flex; align-items: center; gap: 6px; }
    .channel-name { font-weight: 600; color: #fff; font-size: 13px; }
    .viewers { color: #444; font-size: 10px; }
    .jump { font-weight: 600; }
    .jump.high { color: #22c55e; }
    .jump.mega { color: #f59e0b; }
    .vibe-tag {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: #1a1a1a; color: #666; text-align: center;
    }
    .vibe-tag.funny { background: #1a1a0a; color: #fbbf24; }
    .vibe-tag.hype { background: #0a1a0a; color: #22c55e; }
    .vibe-tag.awkward { background: #1a0a1a; color: #c084fc; }
    .vibe-tag.win { background: #0a1a1a; color: #38bdf8; }
    .vibe-tag.loss { background: #1a0a0a; color: #f87171; }
    .vibe-tag.rage { background: #1a0a0a; color: #ef4444; }
    .vibe-tag.shock { background: #1a1a0a; color: #fb923c; }
    .vibe-tag.clutch { background: #0a1a0a; color: #34d399; }
    .vibe-tag.wholesome { background: #0a1a1a; color: #67e8f9; }
    .vibe-tag.drama { background: #1a0a1a; color: #e879f9; }
    .vibe-tag.sad { background: #1a0a0a; color: #f87171; }
    .vibe-tag.neutral { background: #1a1a1a; color: #666; }
    .vibe-tag.error { background: #1a0a0a; color: #ef4444; }
    .desc-col { color: #555; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .vod-link { color: #444; text-decoration: none; font-size: 11px; }
    .vod-link:hover { color: #fff; }
    .time-col { color: #333; font-size: 10px; text-align: right; }

    /* Detail panel */
    .spike-detail {
      display: none; padding: 12px; background: #0e0e0e;
      border: 1px solid #1a1a1a; border-top: none;
      border-radius: 0 0 4px 4px; margin-top: -3px; margin-bottom: 3px;
    }
    .spike-detail.open { display: block; }
    .detail-top { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .detail-top a {
      font-size: 10px; padding: 3px 8px; background: #1a1a1a; color: #666;
      border: 1px solid #222; border-radius: 3px; text-decoration: none; font-family: inherit;
    }
    .detail-top a:hover { background: #222; color: #999; }
    .detail-top a.clip-link { color: #22c55e; border-color: #22c55e44; }
    .detail-desc { font-size: 12px; color: #888; margin-bottom: 10px; line-height: 1.5; }
    .chat-snapshot {
      font-size: 11px; color: #444; line-height: 1.6;
      max-height: 160px; overflow-y: auto;
      padding: 8px; background: #0a0a0a; border-radius: 3px;
    }
    .chat-snapshot .u { color: #555; }

    /* Trending */
    .trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 4px; }
    .trending-card {
      padding: 10px 12px; background: #111; border: 1px solid #161616;
      border-radius: 4px; font-size: 11px; cursor: pointer;
    }
    .trending-card:hover { border-color: #333; }
    .trending-card .channel-name { font-size: 12px; margin-bottom: 2px; }
    .trending-card .rate { color: #555; }
    .trending-card .rate b { color: #ccc; font-weight: 500; }

    .empty { color: #222; font-size: 12px; padding: 24px 0; text-align: center; }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .spike-row { grid-template-columns: 1fr auto auto; }
      .spike-row .desc-col, .spike-row .vod-link, .spike-row .time-col { display: none; }
      .stats { gap: 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>clippy</h1>
    <div style="display:flex;align-items:center;gap:16px">
      <nav>
        <a href="/" class="active">dashboard</a>
        <a href="/docs.html">docs</a>
      </nav>
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">connecting...</span>
      </div>
    </div>
  </header>

  <div class="watch-bar">
    <input type="text" id="channelInput" placeholder="watch a channel..." onkeydown="if(event.key==='Enter')addWatch()">
    <button onclick="addWatch()">watch</button>
  </div>
  <div class="watching-tags" id="watchingTags"></div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="channelCount">-</div>
      <div class="stat-label">channels</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="msgRate">-</div>
      <div class="stat-label">msg/s</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="spikeCount">0</div>
      <div class="stat-label">spikes</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="clipCount">0</div>
      <div class="stat-label">clips</div>
    </div>
  </div>

  <section id="channelStatsSection" style="display:none">
    <h2>watching</h2>
    <div id="channelStats" class="trending-grid"></div>
  </section>

  <section>
    <h2>live spikes</h2>
    <div class="spikes-list" id="spikesList">
      <div class="empty"><span class="pulse">add a channel to start watching</span></div>
    </div>
  </section>

  <section>
    <h2>trending</h2>
    <div class="trending-grid" id="trendingGrid">
      <div class="empty">loading...</div>
    </div>
  </section>

  <script>
    const spikes = []
    const watching = new Set()
    let expandedId = null
    let clipTotal = 0

    // SSE
    const sse = new EventSource('/alerts')
    sse.onmessage = (e) => {
      const data = JSON.parse(e.data)
      if (data.type === 'connected') {
        document.getElementById('statusDot').className = 'dot live'
        document.getElementById('statusText').textContent = 'live'
      }
      if (data.type === 'spike') {
        // Only show spikes from channels we're watching (or show all if none watched)
        if (watching.size > 0 && !watching.has(data.channel.toLowerCase())) return
        const id = Date.now() + '' + Math.random()
        spikes.unshift({ ...data, id, receivedAt: Date.now(), mood: null, description: null, chatSnapshot: null, clipUrl: null, momentId: null })
        if (spikes.length > 50) spikes.pop()
        renderSpikes()
      }
    }
    sse.onerror = () => {
      document.getElementById('statusDot').className = 'dot off'
      document.getElementById('statusText').textContent = 'disconnected'
    }

    async function addWatch(ch) {
      if (!ch) {
        const input = document.getElementById('channelInput')
        ch = input.value.trim().toLowerCase()
        input.value = ''
      }
      if (!ch || watching.has(ch)) return
      watching.add(ch)
      fetch(`/track/${ch}`, { method: 'POST' })
      renderWatchTags()
      refreshChannelStats()
    }

    function removeWatch(ch) {
      watching.delete(ch)
      fetch(`/track/${ch}`, { method: 'DELETE' })
      renderWatchTags()
      refreshChannelStats()
    }

    function renderWatchTags() {
      const el = document.getElementById('watchingTags')
      el.innerHTML = [...watching].map(ch => `
        <div class="watch-tag">
          ${ch}
          <span class="remove" onclick="removeWatch('${ch}')">&times;</span>
        </div>
      `).join('')
    }

    function renderSpikes() {
      const el = document.getElementById('spikesList')
      document.getElementById('spikeCount').textContent = spikes.length
      document.getElementById('clipCount').textContent = clipTotal
      if (spikes.length === 0) {
        if (watching.size === 0) {
          el.innerHTML = '<div class="empty"><span class="pulse">add a channel to start watching</span></div>'
        } else {
          el.innerHTML = `<div class="empty"><span class="pulse">watching ${[...watching].join(', ')} for spikes...</span></div>`
        }
        return
      }
      el.innerHTML = spikes.map(s => {
        const jumpClass = s.jumpPercent > 150 ? 'mega' : s.jumpPercent > 50 ? 'high' : ''
        const ago = timeAgo(s.receivedAt)
        const moodTag = s.mood || s.vibe
        const isOpen = expandedId === s.id
        const isWatched = watching.has(s.channel.toLowerCase())
        return `
          <div class="spike-row ${s.clipUrl ? 'has-clip' : ''}" onclick="toggleSpike('${s.id}')">
            <div class="channel-col">
              <span class="channel-name">${s.channel}</span>
              ${s.viewers ? `<span class="viewers">${(s.viewers/1000).toFixed(1)}k</span>` : ''}
            </div>
            <span class="jump ${jumpClass}">+${s.jumpPercent}%</span>
            <span class="vibe-tag ${moodTag}">${moodTag}</span>
            <span class="desc-col">${s.description || ''}</span>
            ${s.vodUrl ? `<a class="vod-link" href="${s.vodUrl}" target="_blank" onclick="event.stopPropagation()">${s.vodTimestamp}</a>` : '<span class="vod-link">-</span>'}
            <span class="time-col">${ago}</span>
          </div>
          <div class="spike-detail ${isOpen ? 'open' : ''}" id="detail-${s.id}">
            <div class="detail-top">
              ${s.clipUrl ? `<a class="clip-link" href="${s.clipUrl}" target="_blank" onclick="event.stopPropagation()">clip</a>` : ''}
              ${s.vodUrl ? `<a href="${s.vodUrl}" target="_blank" onclick="event.stopPropagation()">vod</a>` : ''}
              ${!isWatched ? `<a href="#" onclick="event.preventDefault();event.stopPropagation();document.getElementById('channelInput').value='${s.channel}';addWatch()">+ watch</a>` : ''}
            </div>
            ${s.description ? `<div class="detail-desc"><b>${s.mood}</b> — ${s.description}</div>` : ''}
            ${s.chatSnapshot ? `
              <div class="chat-snapshot">
                ${s.chatSnapshot.slice(0, 15).map(m => {
                  const idx = m.indexOf(': ')
                  return idx > -1
                    ? `<div><span class="u">${esc(m.slice(0,idx))}:</span> ${esc(m.slice(idx+2))}</div>`
                    : `<div>${esc(m)}</div>`
                }).join('')}
              </div>
            ` : (isWatched ? '<div style="color:#333;font-size:11px">loading...</div>' : '')}
          </div>
        `
      }).join('')
    }

    async function toggleSpike(id) {
      if (expandedId === id) { expandedId = null }
      else {
        expandedId = id
        const spike = spikes.find(s => s.id === id)
        if (spike && !spike.chatSnapshot) {
          try {
            const res = await fetch(`/moments/latest/${spike.channel}`)
            if (res.ok) {
              const m = await res.json()
              spike.chatSnapshot = m.chatSnapshot || []
              spike.momentId = m.id
              spike.clipUrl = m.clipUrl || null
              if (m.mood && m.mood !== 'error') { spike.mood = m.mood; spike.description = m.description }
            }
          } catch {}
        }
      }
      renderSpikes()
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }

    function timeAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000)
      if (s < 60) return `${s}s`
      if (s < 3600) return `${Math.floor(s/60)}m`
      return `${Math.floor(s/3600)}h`
    }

    async function refreshHealth() {
      try {
        const h = await fetch('/health').then(r => r.json())
        document.getElementById('channelCount').textContent = h.totalChannels.toLocaleString()
        document.getElementById('msgRate').textContent = h.totalMsgsPerSec.toFixed(0)
        document.getElementById('statusDot').className = 'dot ' + (h.connected ? 'live' : 'off')
        document.getElementById('statusText').textContent = h.connected ? 'live' : 'disconnected'
      } catch {}
    }

    async function refreshTrending() {
      try {
        const data = await fetch('/trending').then(r => r.json())
        const el = document.getElementById('trendingGrid')
        if (!data.channels?.length) { el.innerHTML = '<div class="empty">no data yet</div>'; return }
        el.innerHTML = data.channels.map(ch => `
          <div class="trending-card" onclick="addWatch('${ch.channel}')">
            <div class="channel-name">${ch.channel}</div>
            <div class="rate"><b>${ch.burst}</b> msg/s</div>
            <span class="vibe-tag ${ch.vibe}">${ch.vibe}</span>
          </div>
        `).join('')
      } catch {}
    }


    async function refreshChannelStats() {
      const section = document.getElementById('channelStatsSection')
      const el = document.getElementById('channelStats')
      if (watching.size === 0) { section.style.display = 'none'; return }
      section.style.display = 'block'

      const cards = await Promise.all([...watching].map(async ch => {
        try {
          const res = await fetch(`/channel-stats/${ch}`)
          if (!res.ok) return `<div class="trending-card"><div class="channel-name">${ch}</div><div class="rate" style="color:#333">warming up...</div></div>`
          const d = await res.json()
          return `
            <div class="trending-card">
              <div class="channel-name">${ch} ${d.viewers ? `<span style="color:#444;font-size:10px">${(d.viewers/1000).toFixed(1)}k</span>` : ''}</div>
              <div class="rate"><b>${d.rate}</b> msg/s</div>
              <div class="rate">baseline <b>${d.baseline}</b></div>
              ${d.isSpike ? '<div style="color:#f59e0b;font-size:10px;margin-top:2px">spiking +' + d.jumpPercent + '%</div>' : ''}
            </div>`
        } catch { return `<div class="trending-card"><div class="channel-name">${ch}</div><div class="rate" style="color:#333">connecting...</div></div>` }
      }))
      el.innerHTML = cards.join('')
    }

    setInterval(() => renderSpikes(), 10000)
    setInterval(refreshHealth, 5000)
    setInterval(refreshTrending, 15000)
    setInterval(refreshChannelStats, 3000)
    refreshHealth()
    refreshTrending()
  </script>
</body>
</html>
