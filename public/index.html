<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clippy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 24px;
      max-width: 960px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 32px;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 16px;
    }
    h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.5px; }
    .status { font-size: 12px; color: #555; }
    .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    .dot.live { background: #22c55e; }
    .dot.off { background: #ef4444; }

    .stats { display: flex; gap: 40px; margin-bottom: 36px; }
    .stat-value { font-size: 22px; font-weight: 600; color: #fff; }
    .stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1.2px; margin-top: 2px; }

    section { margin-bottom: 36px; }
    h2 {
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 1.5px; color: #444; margin-bottom: 12px;
    }

    /* Spike rows */
    .spikes-list { display: flex; flex-direction: column; gap: 4px; }
    .spike-row {
      display: grid;
      grid-template-columns: 160px 70px 60px 80px 1fr 50px;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #161616;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .spike-row:hover { background: #161616; }
    .spike-row.clip-worthy { border-left: 2px solid #f59e0b; }
    .spike-row.expanded { background: #141414; border-color: #222; }
    .channel-col { display: flex; align-items: center; gap: 8px; }
    .channel-name { font-weight: 600; color: #fff; font-size: 13px; }
    .viewers { color: #555; font-size: 10px; }
    .jump { font-weight: 600; font-size: 12px; }
    .jump.high { color: #22c55e; }
    .jump.mega { color: #f59e0b; }
    .vibe-tag {
      font-size: 10px; padding: 2px 6px; border-radius: 3px;
      background: #1a1a1a; color: #666; display: inline-block; text-align: center;
    }
    .vibe-tag.funny { background: #1a1a0a; color: #fbbf24; }
    .vibe-tag.hype { background: #0a1a0a; color: #22c55e; }
    .vibe-tag.awkward { background: #1a0a1a; color: #c084fc; }
    .vibe-tag.win { background: #0a1a1a; color: #38bdf8; }
    .vibe-tag.loss { background: #1a0a0a; color: #f87171; }
    .vibe-tag.rage { background: #1a0a0a; color: #ef4444; }
    .vibe-tag.shock { background: #1a1a0a; color: #fb923c; }
    .vibe-tag.clutch { background: #0a1a0a; color: #34d399; }
    .vibe-tag.wholesome { background: #0a1a1a; color: #67e8f9; }
    .vibe-tag.drama { background: #1a0a1a; color: #e879f9; }
    .vod-link { color: #555; text-decoration: none; font-size: 11px; }
    .vod-link:hover { color: #fff; }
    .time-col { color: #333; font-size: 10px; text-align: right; }

    /* Expanded detail panel */
    .spike-detail {
      display: none;
      padding: 12px;
      background: #0e0e0e;
      border: 1px solid #1a1a1a;
      border-top: none;
      border-radius: 0 0 4px 4px;
      margin-top: -4px;
      margin-bottom: 4px;
    }
    .spike-detail.open { display: block; }
    .detail-description {
      font-size: 12px; color: #999; margin-bottom: 10px;
      line-height: 1.5;
    }
    .detail-description em { color: #ccc; font-style: normal; }
    .chat-snapshot {
      font-size: 11px; color: #444; line-height: 1.6;
      max-height: 180px; overflow-y: auto;
      padding: 8px; background: #0a0a0a; border-radius: 3px;
    }
    .chat-snapshot .chat-user { color: #666; }
    .chat-snapshot .chat-msg { color: #555; }
    .classify-btn {
      font-size: 10px; padding: 3px 8px; background: #1a1a1a; color: #666;
      border: 1px solid #222; border-radius: 3px; cursor: pointer;
      margin-bottom: 8px; font-family: inherit;
    }
    .classify-btn:hover { background: #222; color: #999; }
    .classify-btn:disabled { opacity: 0.3; cursor: default; }

    /* Trending grid */
    .trending-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 6px; }
    .trending-card {
      padding: 10px 12px;
      background: #111;
      border: 1px solid #161616;
      border-radius: 4px;
      font-size: 11px;
    }
    .trending-card .channel-name { font-size: 12px; margin-bottom: 3px; }
    .trending-card .rate { color: #555; }
    .trending-card .rate b { color: #ccc; font-weight: 500; }
    .trending-card .vibe-tag { margin-top: 4px; }

    .empty { color: #282828; font-size: 12px; padding: 32px 0; text-align: center; }

    @media (max-width: 640px) {
      body { padding: 16px; }
      .spike-row { grid-template-columns: 1fr auto auto; gap: 6px; font-size: 11px; }
      .spike-row .vod-link, .spike-row .time-col, .spike-row .viewers { display: none; }
      .stats { gap: 24px; }
      .trending-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <h1>clippy</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">connecting...</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="channelCount">-</div>
      <div class="stat-label">channels</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="msgRate">-</div>
      <div class="stat-label">msg/s</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="spikeCount">0</div>
      <div class="stat-label">spikes</div>
    </div>
  </div>

  <section>
    <h2>live spikes</h2>
    <div class="spikes-list" id="spikesList">
      <div class="empty">waiting for spikes...</div>
    </div>
  </section>

  <section>
    <h2>trending channels</h2>
    <div class="trending-grid" id="trendingGrid">
      <div class="empty">loading...</div>
    </div>
  </section>

  <script>
    const spikes = []
    let expandedId = null

    const sse = new EventSource('/alerts')
    sse.onmessage = (e) => {
      const data = JSON.parse(e.data)
      if (data.type === 'connected') {
        document.getElementById('statusDot').className = 'dot live'
        document.getElementById('statusText').textContent = 'live'
      }
      if (data.type === 'spike') {
        const id = Date.now() + Math.random()
        spikes.unshift({ ...data, id, receivedAt: Date.now(), mood: null, description: null, chatSnapshot: null })
        if (spikes.length > 50) spikes.pop()
        renderSpikes()
      }
    }
    sse.onerror = () => {
      document.getElementById('statusDot').className = 'dot off'
      document.getElementById('statusText').textContent = 'disconnected'
    }

    function renderSpikes() {
      const el = document.getElementById('spikesList')
      document.getElementById('spikeCount').textContent = spikes.length
      if (spikes.length === 0) {
        el.innerHTML = '<div class="empty">waiting for spikes...</div>'
        return
      }
      el.innerHTML = spikes.map(s => {
        const jumpClass = s.jumpPercent > 150 ? 'mega' : s.jumpPercent > 80 ? 'high' : ''
        const ago = timeAgo(s.receivedAt)
        const moodTag = s.mood || s.vibe
        const isOpen = expandedId === s.id
        return `
          <div class="spike-row ${s.clipWorthy ? 'clip-worthy' : ''} ${isOpen ? 'expanded' : ''}" onclick="toggleSpike('${s.id}')">
            <div class="channel-col">
              <span class="channel-name">${s.channel}</span>
              ${s.viewers ? `<span class="viewers">${(s.viewers/1000).toFixed(1)}k</span>` : ''}
            </div>
            <span class="jump ${jumpClass}">+${s.jumpPercent}%</span>
            <span class="vibe-tag ${moodTag}">${moodTag}</span>
            <span>${s.description ? '<span style="color:#555;font-size:10px">ai</span>' : ''}</span>
            ${s.vodUrl ? `<a class="vod-link" href="${s.vodUrl}" target="_blank" onclick="event.stopPropagation()">${s.vodTimestamp}</a>` : '<span class="vod-link">-</span>'}
            <span class="time-col">${ago}</span>
          </div>
          <div class="spike-detail ${isOpen ? 'open' : ''}" id="detail-${s.id}">
            ${s.description ? `<div class="detail-description"><em>${s.mood}</em> — ${s.description}</div>` : ''}
            <div style="display:flex;gap:8px;margin-bottom:8px">
              ${!s.description ? `<button class="classify-btn" id="btn-${s.id}" onclick="event.stopPropagation(); classifyMoment('${s.id}')">classify with ai</button>` : ''}
              ${s.momentId ? `<a class="classify-btn" href="/clip/${s.momentId}" target="_blank" style="text-decoration:none;display:inline-block" onclick="event.stopPropagation()">watch clip</a>` : ''}
            </div>
            ${s.chatSnapshot ? `
              <div class="chat-snapshot">
                ${s.chatSnapshot.map(m => {
                  const idx = m.indexOf(': ')
                  if (idx === -1) return `<div><span class="chat-msg">${esc(m)}</span></div>`
                  return `<div><span class="chat-user">${esc(m.slice(0, idx))}:</span> <span class="chat-msg">${esc(m.slice(idx+2))}</span></div>`
                }).join('')}
              </div>
            ` : '<div style="color:#333;font-size:11px">loading chat...</div>'}
          </div>
        `
      }).join('')
    }

    async function toggleSpike(id) {
      if (expandedId === id) {
        expandedId = null
      } else {
        expandedId = id
        // Try to load chat snapshot from moments API if we don't have it
        const spike = spikes.find(s => String(s.id) === String(id))
        if (spike && !spike.chatSnapshot) {
          // Find matching moment by channel + approximate time
          try {
            const res = await fetch(`/moments/latest/${spike.channel}`)
            if (res.ok) {
              const moment = await res.json()
              spike.chatSnapshot = moment.chatSnapshot || []
              spike.momentId = moment.id
            }
          } catch {}
        }
      }
      renderSpikes()
    }

    async function classifyMoment(id) {
      const spike = spikes.find(s => String(s.id) === String(id))
      if (!spike || !spike.momentId) return
      const btn = document.getElementById(`btn-${id}`)
      if (btn) { btn.disabled = true; btn.textContent = 'classifying...' }
      try {
        const res = await fetch(`/moments/${spike.momentId}/classify`)
        if (res.ok) {
          const data = await res.json()
          spike.mood = data.mood
          spike.description = data.description
        }
      } catch {}
      renderSpikes()
    }

    function esc(s) {
      const d = document.createElement('div')
      d.textContent = s
      return d.innerHTML
    }

    function timeAgo(ts) {
      const s = Math.floor((Date.now() - ts) / 1000)
      if (s < 60) return `${s}s`
      if (s < 3600) return `${Math.floor(s/60)}m`
      return `${Math.floor(s/3600)}h`
    }

    async function refreshHealth() {
      try {
        const res = await fetch('/health')
        const health = await res.json()
        document.getElementById('channelCount').textContent = health.totalChannels.toLocaleString()
        document.getElementById('msgRate').textContent = health.totalMsgsPerSec.toFixed(0)
        document.getElementById('statusDot').className = 'dot ' + (health.connected ? 'live' : 'off')
        document.getElementById('statusText').textContent = health.connected ? 'live' : 'disconnected'
      } catch {}
    }

    async function refreshTrending() {
      try {
        const res = await fetch('/trending')
        const data = await res.json()
        const el = document.getElementById('trendingGrid')
        if (!data.channels || data.channels.length === 0) {
          el.innerHTML = '<div class="empty">no active channels yet</div>'
          return
        }
        el.innerHTML = data.channels.map(ch => `
          <div class="trending-card">
            <div class="channel-name">${ch.channel}</div>
            <div class="rate"><b>${ch.burst}</b> msg/s</div>
            <div class="rate">baseline <b>${ch.baseline}</b></div>
            <span class="vibe-tag ${ch.vibe}">${ch.vibe}</span>
          </div>
        `).join('')
      } catch {}
    }

    setInterval(() => renderSpikes(), 10000)
    setInterval(refreshHealth, 5000)
    setInterval(refreshTrending, 10000)
    refreshHealth()
    refreshTrending()
  </script>
</body>
</html>
